apiVersion: apps/v1
kind: Deployment
metadata:
  name: olp-backend
  namespace: olp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: olp-backend
  template:
    metadata:
      labels:
        app: olp-backend
    spec:
      containers:
        - name: backend
          image: your-dockerhub/olp-backend:latest
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: olp-config
            - secretRef:
                name: olp-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: olp
spec:
  selector:
    app: olp-backend
  ports:
    - port: 5000
      targetPort: 5000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: olp-backend-hpa
  namespace: olp
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: olp-backend
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
