apiVersion: v1
kind: ConfigMap
metadata:
  name: olp-config
  namespace: olp
data:
  NODE_ENV: "production"
  PORT: "5000"
  MONGODB_URI: "mongodb://mongodb-service:27017/olp"
  REDIS_URL: "redis://redis-service:6379"
  JWT_ACCESS_EXPIRES: "15m"
  JWT_REFRESH_EXPIRES: "7d"
  CORS_ORIGIN: "http://learndev.local"
  CLIENT_URL: "http://learndev.local"
  SEED_ON_START: "true"
  LOG_LEVEL: "info"
  RATE_LIMIT_WINDOW_MS: "900000"
  RATE_LIMIT_MAX: "100"
