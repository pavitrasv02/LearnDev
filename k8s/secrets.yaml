# IMPORTANT: Replace these placeholder values before deploying to production.
# Generate secrets with: openssl rand -base64 48
# Then base64-encode: echo -n "your-secret" | base64
#
# Do NOT commit real secrets to git — use a secrets manager or sealed secrets.
apiVersion: v1
kind: Secret
metadata:
  name: olp-secrets
  namespace: olp
type: Opaque
stringData:
  JWT_SECRET: "change-me-in-production-use-long-random-secret"
  JWT_REFRESH_SECRET: "change-me-refresh-secret-different-from-jwt-secret"
  SMTP_HOST: ""
  SMTP_PORT: "587"
  SMTP_USER: ""
  SMTP_PASS: ""
  EMAIL_FROM: "LearnDev <noreply@learndev.io>"
