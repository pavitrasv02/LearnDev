# Online Learning Platform — Full Stack DevOps
# Run: docker compose up --build
# App: http://localhost (via nginx proxy)

services:
  mongodb:
    image: mongo:7
    container_name: olp-mongodb
    volumes:
      - mongodb_data:/data/db
    networks:
      - olp-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: olp-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - olp-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: olp-backend
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI:  ${MONGODB_URI}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-use-long-secret}
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost,http://localhost:80,http://localhost:3000
      SEED_ON_START: "true"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - olp-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: olp-frontend
    networks:
      - olp-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: olp-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - olp-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: olp-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - olp-network
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:11.1.0
    container_name: olp-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3001:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - olp-network
    profiles:
      - monitoring

volumes:
  mongodb_data:
  redis_data:

networks:
  olp-network:
    driver: bridge
