name: LearnDev CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  REGISTRY: docker.io
  NODE_VERSION: "20"

jobs:
  # ── Job 1: Lint + Test + Build ─────────────────────────────────────────────
  build-and-test:
    name: Lint → Test → Build
    runs-on: ubuntu-latest

    services:
      # In-process MongoDB for integration tests
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand(\"ping\").ok'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # In-process Redis for integration tests
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5

    env:
      NODE_ENV: test
      PORT: 5001
      MONGODB_URI: mongodb://localhost:27017/olp-test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-jwt-secret-do-not-use-in-prod
      JWT_ACCESS_EXPIRES: 15m
      JWT_REFRESH_SECRET: ci-test-refresh-secret-do-not-use-in-prod
      JWT_REFRESH_EXPIRES: 7d
      CLIENT_URL: http://localhost:3000
      CORS_ORIGIN: http://localhost:3000
      RATE_LIMIT_WINDOW_MS: "900000"
      RATE_LIMIT_MAX: "1000"
      LOG_LEVEL: error

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      # ── Backend ──────────────────────────────────────────────────────────
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Lint backend (if eslint config exists)
        working-directory: backend
        run: |
          if [ -f ".eslintrc*" ] || [ -f "eslint.config*" ]; then
            npx eslint src/ --max-warnings 0
          else
            echo "No ESLint config found, skipping lint"
          fi

      - name: Run backend tests
        working-directory: backend
        run: |
          if [ -d "src/__tests__" ] || [ -d "tests" ] || [ -d "__tests__" ]; then
            npm test -- --forceExit --detectOpenHandles
          else
            echo "No test directory found, skipping tests"
          fi

      # ── Frontend ─────────────────────────────────────────────────────────
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend (if eslint config exists)
        working-directory: frontend
        run: |
          if [ -f ".eslintrc*" ] || [ -f "eslint.config*" ]; then
            npx eslint src/ --max-warnings 0
          else
            echo "No ESLint config found, skipping lint"
          fi

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: /api
        run: npm run build

      - name: Verify frontend build output
        run: |
          test -f frontend/dist/index.html
          echo "Frontend build verified"

  # ── Job 2: Docker build (push on main only) ────────────────────────────────
  docker:
    name: Docker Build → Push
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images (smoke test — no push on PR)
        run: docker compose build backend frontend

      - name: Start services and run health check
        run: |
          # Write minimal .env for compose
          cat > .env << 'EOF'
          MONGODB_URI=mongodb://mongodb:27017/olp
          JWT_SECRET=ci-smoke-test-secret
          JWT_REFRESH_SECRET=ci-smoke-refresh-secret
          EOF

          docker compose up -d mongodb redis backend frontend nginx
          echo "Waiting for services to be ready..."
          sleep 40

      - name: Health check
        run: |
          curl --retry 5 --retry-delay 5 --retry-connrefused -f http://localhost/health
          curl --retry 5 --retry-delay 5 --retry-connrefused -f http://localhost/api/health
          echo "Health checks passed"

      - name: Stop services
        if: always()
        run: docker compose down -v --remove-orphans

      # Push to Docker Hub only on main branch if secrets are configured
      - name: Login to Docker Hub
        if: secrets.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        if: secrets.DOCKERHUB_USERNAME != ''
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/olp-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/olp-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        if: secrets.DOCKERHUB_USERNAME != ''
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/olp-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/olp-frontend:${{ github.sha }}
          build-args: VITE_API_URL=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max
