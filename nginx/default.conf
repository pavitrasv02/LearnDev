# LearnDev — NGINX reverse proxy
# Routes:
#   /api/*     → backend:5000
#   /health    → backend:5000/health
#   /metrics   → BLOCKED from public (internal only via Docker network)
#   /*         → frontend:80 (React SPA)

upstream frontend_upstream {
    server frontend:80;
    keepalive 32;
}

upstream backend_upstream {
    server backend:5000;
    keepalive 32;
}

server {
    listen 80;
    server_name localhost;

    client_max_body_size 10M;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript;

    # Security headers (supplement Helmet in Express)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Block external access to Prometheus metrics
    # Prometheus scrapes directly via Docker network: backend:5000/metrics
    location = /metrics {
        deny all;
        return 403;
    }

    # API gateway — proxy to Express backend
    location /api/ {
        proxy_pass http://backend_upstream/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Required for httpOnly cookie (refresh token) to pass through
        proxy_pass_header Set-Cookie;
        proxy_cookie_path / "/; SameSite=Strict";
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Backend health check endpoint (used by load balancers / K8s probes)
    location = /health {
        proxy_pass http://backend_upstream/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # Frontend React SPA — serve with fallback for client-side routing
    location / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 30s;
        proxy_read_timeout 30s;
    }
}
